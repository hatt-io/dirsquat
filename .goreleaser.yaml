version: 2

project_name: dirsquat

builds:
  - id: dirsquat-linux
    binary: dirsquat
    main: .
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: dirsquat-darwin
    binary: dirsquat
    main: .
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: dirsquat-linux
    ids: [dirsquat-linux]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

  - id: dirsquat-darwin
    ids: [dirsquat-darwin]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

nfpms:
  - id: dirsquat-linux-pkgs
    ids: [dirsquat-linux]
    package_name: dirsquat
    file_name_template: "{{ .ConventionalFileName }}"
    bindir: /usr/bin
    homepage: "https://github.com/hatt-io/dirsquat"
    description: "A tracker that helps you keep those files moving"
    license: MIT
    maintainer: "hatt-io"
    formats:
      - deb
      - rpm
      - apk
      - archlinux

homebrew_casks:
  - name: dirsquat
    ids: [dirsquat-darwin]
    binaries:
      - dirsquat
    repository:
      owner: hatt-io
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/hatt-io/dirsquat"
    description: "A tracker that helps you keep those files moving"
    license: "MIT"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
